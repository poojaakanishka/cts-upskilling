<!--
Exercise 7.1:
Create a navbar using d-flex, flex-column, and flex-md-row for responsive behavior.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flex Navbar</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


<div class="d-flex flex-column flex-md-row justify-content-between align-items-center p-3 bg-dark text-white">

    <div class="fs-4 fw-bold">MyPortal</div>

    <div class="d-flex flex-column flex-md-row gap-3 mt-3 mt-md-0">

        <a href="#" class="text-white text-decoration-none">Home</a>
        <a href="#" class="text-white text-decoration-none">Events</a>
        <a href="#" class="text-white text-decoration-none">About</a>
        <a href="#" class="text-white text-decoration-none">Contact</a>

    </div>

</div>

<div class="container mt-5">
    <h2>Welcome to the Portal</h2>
    <p>This navbar changes from column (mobile) to row (desktop).</p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
