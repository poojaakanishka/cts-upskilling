<!--
Exercise 15.1:
Add border utilities like border, border-primary, border-3, and rounded-circle to an image.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Border Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 text-center">

    <h2 class="mb-4">Image Border Utilities</h2>

    <img src="https://via.placeholder.com/200"
         class="border border-primary border-3 rounded-circle p-2"
         alt="Sample Image">

    <p class="mt-3">
        This image uses <b>border</b>, <b>border-primary</b>, <b>border-3</b>, and <b>rounded-circle</b>.
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
