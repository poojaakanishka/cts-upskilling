<!--
Exercise 11.1:
Create a profile card using card, card-body, card-title, and card-img-top.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Profile Card</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 d-flex justify-content-center">

    <div class="card" style="width: 18rem;">

        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Profile Image">

        <div class="card-body text-center">

            <h5 class="card-title">John Doe</h5>
            <p class="card-text text-muted">Frontend Developer</p>
            <p class="card-text">
                Passionate about building responsive web applications using Bootstrap.
            </p>

            <a href="#" class="btn btn-primary">View Profile</a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
