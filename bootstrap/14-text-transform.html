<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Text Transform Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Text Transformation Utilities</h2>

    <p class="text-uppercase">
        this text is transformed to uppercase using bootstrap utility class.
    </p>

    <p class="text-lowercase">
        THIS TEXT IS TRANSFORMED TO LOWERCASE USING BOOTSTRAP UTILITY CLASS.
    </p>

    <p class="text-capitalize">
        this text is transformed to capitalized format using bootstrap utility class.
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
