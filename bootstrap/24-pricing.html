<!--
Exercise 12.2:
Build a pricing section where spacing improves the layout.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Pricing Section</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">Pricing Plans</h2>

    <div class="row g-4">

        <div class="col-12 col-md-4">
            <div class="card p-4 h-100 text-center shadow-sm">
                <h4 class="mb-3">Basic</h4>
                <h2 class="mb-3">$9</h2>
                <p class="text-muted mb-4">For personal use</p>
                <ul class="list-unstyled mb-4">
                    <li class="mb-2">✔ 1 Project</li>
                    <li class="mb-2">✔ Basic Support</li>
                    <li class="mb-2">✔ Limited Storage</li>
                </ul>
                <button class="btn btn-outline-primary mt-auto">Choose Plan</button>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card p-4 h-100 text-center shadow-sm border-primary">
                <h4 class="mb-3">Standard</h4>
                <h2 class="mb-3">$29</h2>
                <p class="text-muted mb-4">For small teams</p>
                <ul class="list-unstyled mb-4">
                    <li class="mb-2">✔ 10 Projects</li>
                    <li class="mb-2">✔ Priority Support</li>
                    <li class="mb-2">✔ 50GB Storage</li>
                </ul>
                <button class="btn btn-primary mt-auto">Choose Plan</button>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card p-4 h-100 text-center shadow-sm">
                <h4 class="mb-3">Premium</h4>
                <h2 class="mb-3">$59</h2>
                <p class="text-muted mb-4">For large teams</p>
                <ul class="list-unstyled mb-4">
                    <li class="mb-2">✔ Unlimited Projects</li>
                    <li class="mb-2">✔ 24/7 Support</li>
                    <li class="mb-2">✔ 1TB Storage</li>
                </ul>
                <button class="btn btn-outline-dark mt-auto">Choose Plan</button>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
