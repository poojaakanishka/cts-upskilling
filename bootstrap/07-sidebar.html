<!--
Exercise 4.1:
Design a two-column layout with a sidebar (col-md-3) and content area (col-md-9).
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Two Column Layout</h2>

    <div class="row">

        <div class="col-12 col-md-3 bg-light p-3 border">
            <h4>Sidebar</h4>
            <ul class="list-unstyled">
                <li>Home</li>
                <li>About</li>
                <li>Events</li>
                <li>Contact</li>
            </ul>
        </div>

        <div class="col-12 col-md-9 p-3">
            <h3>Main Content</h3>
            <p>
                This is the main content area. On mobile, sidebar and content stack vertically.
                On medium and larger screens, sidebar takes 3 columns and content takes 9 columns.
            </p>
        </div>

    </div>

</div>

<script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
