<!--
Exercise 7.2:
Use justify-content-between and align-items-center in a card layout.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Card Flex Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Card Layout with Flex Utilities</h2>

    <div class="card p-3">

        <div class="d-flex justify-content-between align-items-center">

            <div>
                <h5 class="mb-0">Event Title</h5>
                <small class="text-muted">Chennai • June 2026</small>
            </div>

            <button class="btn btn-primary">Register</button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
