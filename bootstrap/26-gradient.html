<!--
Exercise 13.2:
Use bg-gradient with bg-dark and white text.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Gradient Background</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="p-5 bg-dark bg-gradient text-white rounded">

        <h1 class="mb-3">Gradient Dark Section</h1>

        <p>
            This section uses <b>bg-dark</b>, <b>bg-gradient</b>, and <b>text-white</b> to create a stylish header-like block.
        </p>

        <button class="btn btn-light">Learn More</button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
