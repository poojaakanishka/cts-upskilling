<!--
Exercise 12.1:
Apply margin (m-3, mt-4) and padding (p-2, py-5) utilities on layout sections.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Spacing Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">Spacing Utilities Example</h2>

    <div class="bg-primary text-white m-3 p-2">
        <h4>Section 1</h4>
        <p>This section uses margin (m-3) and padding (p-2).</p>
    </div>

    <div class="bg-success text-white mt-4 py-5">
        <h4>Section 2</h4>
        <p>This section uses margin-top (mt-4) and vertical padding (py-5).</p>
    </div>

    <div class="bg-warning text-dark m-3 py-5">
        <h4>Section 3</h4>
        <p>This section combines m-3 and py-5 utilities.</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
