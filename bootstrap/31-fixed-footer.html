<!--
Exercise 16.1:
Create a fixed footer using position-fixed bottom-0.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Footer Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-3">Fixed Footer Example</h2>

    <p>
        Scroll down to see the footer fixed at the bottom of the screen.
    </p>

    <div style="height: 800px;">
        <p>Extra content to enable scrolling...</p>
    </div>

</div>

<footer class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center p-3">
    © 2026 My Bootstrap Project | All Rights Reserved
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
