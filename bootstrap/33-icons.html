<!--
Exercise 17.1:
Install and use Bootstrap Icons in a webpage: add social media icons in the footer.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Icons Footer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 text-center">

    <h2>Follow Us</h2>
    <p class="text-muted">Connect with us on social media</p>

</div>

<footer class="bg-dark text-white text-center p-4 mt-5">

    <p class="mb-3">© 2026 My Website</p>

    <a href="#" class="text-white me-3 fs-4">
        <i class="bi bi-facebook"></i>
    </a>

    <a href="#" class="text-white me-3 fs-4">
        <i class="bi bi-twitter-x"></i>
    </a>

    <a href="#" class="text-white me-3 fs-4">
        <i class="bi bi-instagram"></i>
    </a>

    <a href="#" class="text-white fs-4">
        <i class="bi bi-linkedin"></i>
    </a>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
