<!--
Exercise 13.1:
Create a dashboard page using contextual background classes (bg-primary, bg-warning, etc.) and
text colors.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Dashboard</h2>

    <div class="row g-3">

        <div class="col-12 col-md-4">
            <div class="p-4 bg-primary text-white text-center rounded">
                <h4>Users</h4>
                <h2>1200</h2>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="p-4 bg-success text-white text-center rounded">
                <h4>Events</h4>
                <h2>85</h2>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="p-4 bg-warning text-dark text-center rounded">
                <h4>Feedback</h4>
                <h2>340</h2>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="p-4 bg-danger text-white text-center rounded">
                <h4>Alerts</h4>
                <h2>5</h2>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="p-4 bg-info text-white text-center rounded">
                <h4>Messages</h4>
                <h2>27</h2>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
