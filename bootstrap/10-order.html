<!--
Exercise 5.2:
Reorder columns on different screen sizes using order-md-2, order-md-1.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Column Reordering</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Column Reordering Example</h2>

    <div class="row">

        <!-- Column 1 -->
        <div class="col-12 col-md-6 order-2 order-md-1">
            <div class="p-4 bg-primary text-white text-center">
                Column 1 (Becomes second on mobile, first on md+)
            </div>
        </div>

        <!-- Column 2 -->
        <div class="col-12 col-md-6 order-1 order-md-2">
            <div class="p-4 bg-success text-white text-center">
                Column 2 (Becomes first on mobile, second on md+)
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
