<!--
Exercise 1.2:
Set up a project using npm or downloaded Bootstrap files. Use the downloaded files in a sample
HTML page.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Local Files Example</title>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">
        <h1 class="text-primary">Bootstrap Using Downloaded Files</h1>
        <p>This page uses Bootstrap files stored locally in the project.</p>
        <button class="btn btn-success">Click Me</button>
    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
