<!--
Exercise 7.1:
Create a sample page with different Bootstrap typography utilities: display-1, lead, text-muted,
fw-bold, etc.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Typography Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="display-1 fw-bold">Display 1 Heading</h1>

    <p class="lead">
        This is a lead paragraph. It stands out from normal text.
    </p>

    <p class="text-muted">
        This is muted text used for secondary information.
    </p>

    <p class="fw-bold">
        This text is bold using Bootstrap utility classes.
    </p>

    <p class="fw-light">
        This text is light weight.
    </p>

    <p class="text-primary">
        This is primary colored text using Bootstrap utilities.
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
