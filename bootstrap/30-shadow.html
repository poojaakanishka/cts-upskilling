<!--
Exercise 15.2:
Use shadow, shadow-lg and rounded-pill in a card.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Shadow & Rounded Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 d-flex justify-content-center">

    <div class="card shadow-lg rounded-pill text-center p-4" style="width: 22rem;">

        <h4 class="mb-3">Premium Plan</h4>

        <h2 class="text-primary mb-3">$49</h2>

        <p class="text-muted mb-4">
            Best choice for professionals
        </p>

        <button class="btn btn-primary rounded-pill px-4">
            Buy Now
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
