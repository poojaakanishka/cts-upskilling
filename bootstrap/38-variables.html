<!--
Exercise 19.2:
Customize primary colors and border radius via _variables.scss and recompile Bootstrap.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Sass Theming</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
 
            --bs-primary: #ff4d6d;
            --bs-border-radius: 1.5rem;
        }

        body {
            background-color: #f8f9fa;
        }

        .text-primary {
            color: var(--bs-primary) !important;
        }

        .btn-primary {
            background-color: var(--bs-primary);
            border-color: var(--bs-primary);
            border-radius: var(--bs-border-radius);
        }

        .btn-primary:hover {
            background-color: #e0435f;
            border-color: #e0435f;
        }

        .card {
            border-radius: var(--bs-border-radius);
        }

        .badge-primary {
            background-color: var(--bs-primary);
        }
    </style>
</head>
<body>

<div class="container mt-5 text-center">

    <h1 class="text-primary mb-4">Custom Bootstrap Theme (Sass)</h1>

    <p class="lead">
        This simulates customizing <b>primary color</b> and <b>border radius</b> using Sass variables.
    </p>

    <div class="card shadow-sm p-4">

        <h3 class="text-primary">Themed Card</h3>

        <p>
            This card reflects custom Sass-based Bootstrap customization.
        </p>

        <span class="badge badge-primary mb-3">New Theme</span>

        <br><br>

        <button class="btn btn-primary">
            Custom Primary Button
        </button>

    </div>

</div>

</body>
</html>
