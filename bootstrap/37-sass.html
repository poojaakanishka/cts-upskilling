<!--
Exercise 19.1:
Set up a Bootstrap 5 project with Sass using npm.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap + Sass Setup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .custom-title {
            color: #0d6efd;
            font-weight: bold;
        }

        .custom-box {
            border: 2px solid #0d6efd;
            padding: 20px;
            border-radius: 10px;
            background: white;
        }
    </style>
</head>
<body>

<div class="container mt-5 text-center">

    <h1 class="custom-title">Bootstrap + Sass Setup Demo</h1>

    <p class="lead">
        This simulates a Bootstrap project using Sass compiled via npm.
    </p>

    <div class="custom-box mt-4">

        <p>This box represents custom SCSS styling merged with Bootstrap.</p>

        <button class="btn btn-primary">Bootstrap Button</button>
        <button class="btn btn-outline-primary">Outline Button</button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
