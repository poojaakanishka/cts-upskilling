<!--
Exercise 14.2:
Create a responsive sidebar that only shows on tablets and above.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Responsive Sidebar Example</h2>

    <div class="row">

        <div class="col-md-3 d-none d-md-block bg-dark text-white p-3">
            <h5>Sidebar</h5>
            <ul class="list-unstyled">
                <li>Dashboard</li>
                <li>Profile</li>
                <li>Settings</li>
                <li>Logout</li>
            </ul>
        </div>

        <div class="col-12 col-md-9 p-3">
            <h3>Main Content</h3>
            <p>
                This content takes full width on mobile and adjusts when sidebar appears on tablet (md) and larger screens.
            </p>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
