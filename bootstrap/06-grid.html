<!--
Exercise 3.2:
Use .container, .row, and .col-* classes appropriately for responsive design.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid Layout</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Responsive Grid Layout Example</h2>

    <div class="row">

        <div class="col-12 col-md-4 mb-3">
            <div class="p-3 bg-primary text-white text-center">
                Column 1
            </div>
        </div>

        <div class="col-12 col-md-4 mb-3">
            <div class="p-3 bg-success text-white text-center">
                Column 2
            </div>
        </div>

        <div class="col-12 col-md-4 mb-3">
            <div class="p-3 bg-warning text-dark text-center">
                Column 3
            </div>
        </div>

    </div>

</div>

<script src="bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
