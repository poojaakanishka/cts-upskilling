<!--
Exercise 9.2:
Add button groups using btn-group, and create toggle buttons with checkboxes.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Button Groups & Toggle Buttons</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Button Group Example</h2>

    <div class="btn-group mb-4" role="group">
        <button class="btn btn-primary">Left</button>
        <button class="btn btn-secondary">Middle</button>
        <button class="btn btn-success">Right</button>
    </div>

    <hr>

    <h2 class="mb-3">Toggle Buttons (Checkbox)</h2>

    <div class="btn-group" role="group">

        <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
        <label class="btn btn-outline-primary" for="check1">Option 1</label>

        <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
        <label class="btn btn-outline-primary" for="check2">Option 2</label>

        <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
        <label class="btn btn-outline-primary" for="check3">Option 3</label>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
