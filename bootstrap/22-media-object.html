<!--
Exercise 11.2:
Design a media object layout using media and align an image to the left of the content.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Media Object Layout</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Media Object Layout</h2>

    <div class="d-flex align-items-start gap-3 p-3 border rounded">

        <img src="https://via.placeholder.com/100" class="rounded" alt="Image">

        <div>
            <h5 class="mb-1">Media Heading</h5>
            <p class="mb-0 text-muted">
                This is an example of a media object layout using Bootstrap flex utilities.
                The image is aligned to the left of the content.
            </p>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
