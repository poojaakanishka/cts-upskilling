<!--
Exercise 14.1:
Use d-none, d-md-block, d-lg-flex to hide/show sections based on screen size.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Display Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Responsive Visibility Example</h2>

    <div class="d-none d-md-block bg-primary text-white p-3 mb-3">
        Visible only on medium (md) and larger screens
    </div>

    <div class="d-none d-lg-flex bg-success text-white p-3 mb-3 justify-content-between align-items-center">
        <span>This is hidden on small & medium screens</span>
        <button class="btn btn-light btn-sm">Action</button>
    </div>

    <div class="bg-warning text-dark p-3">
        Always visible section
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
