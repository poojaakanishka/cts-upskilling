<!--
Exercise 5.1:
Use justify-content-center and align-items-center to center content inside a row.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Content with Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Centered Content Example</h2>

    <!-- Row with center alignment -->
    <div class="row justify-content-center align-items-center" style="height: 300px; border: 2px dashed #ccc;">

        <div class="col-6">
            <div class="p-4 bg-primary text-white text-center">
                I am centered using Bootstrap Flex utilities
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
