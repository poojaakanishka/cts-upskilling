<!--
9. Geolocation for Event Mapping
Scenario: Locate the nearest event to the user.
Objective: Practice geolocation.getCurrentPosition, error handling, and options
Task:
• Create a button “Find Nearby Events”
• On click, use getCurrentPosition to get and display coordinates
• Handle permission denial and timeouts
• Use high accuracy options
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation for Event Mapping</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 30px;
        }

        .container {
            width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkblue;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Find Nearby Events</h2>

        <button onclick="findLocation()">
            Find Nearby Events
        </button>

        <p id="result"></p>
    </div>

    <script>
        function findLocation() {

            if (!navigator.geolocation) {
                document.getElementById("result").innerHTML =
                    "Geolocation is not supported by this browser.";
                return;
            }

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                showPosition,
                showError,
                options
            );
        }

        function showPosition(position) {
            document.getElementById("result").innerHTML =
                "Latitude: " + position.coords.latitude +
                "<br>Longitude: " + position.coords.longitude;
        }

        function showError(error) {
            let message = "";

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    message = "Location access denied by user.";
                    break;

                case error.POSITION_UNAVAILABLE:
                    message = "Location information unavailable.";
                    break;

                case error.TIMEOUT:
                    message = "Location request timed out.";
                    break;

                default:
                    message = "An unknown error occurred.";
            }

            document.getElementById("result").innerHTML = message;
        }
    </script>

</body>
</html>
