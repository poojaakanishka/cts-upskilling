<!--
2. Navigation and Linking
Scenario: Users should navigate between "Home", "Events", and "Contact" sections.
Objective: Provide intuitive navigation and section-based references.
Task:
• Use <nav> with anchor tags <a href="#events">Events</a>
• Define matching IDs for each section like <section id="events">
• Add a link to an external help document using <a href="help.html" target="_blank">
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation and Linking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            padding: 40px;
            min-height: 300px;
        }

        #home {
            background-color: #f4f4f4;
        }

        #events {
            background-color: #e8f5e9;
        }

        #contact {
            background-color: #e3f2fd;
        }

        #help {
            background-color: #fff3cd;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#events">Events</a>
        <a href="#contact">Contact</a>
        <a href="#help" target="_blank">Help</a>
    </nav>

    <section id="home">
        <h2>Home</h2>
        <p>Welcome to our website.</p>
    </section>


    <section id="events">
        <h2>Events</h2>
        <p>Details about upcoming events.</p>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p>Email: contact@example.com</p>
        <p>Phone: +91 9876543210</p>
    </section>

    <section id="help">
        <h2>Help</h2>
        <p>This section provides help and guidance for using the website.</p>
    </section>

</body>
</html>
