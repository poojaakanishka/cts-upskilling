<!--
7. Video Invite with Media Events
Scenario: Show a short event promo video.
Objective: Work with <video> and oncanplay event
Task:
• Insert a <video> element with source and controls
• Use oncanplay to display a message like "Video ready to play"
• Use onbeforeunload to warn users if they try to leave the form page unfinished
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Promo Video</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        padding: 20px;
    }

    .container {
        width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }

    video {
        width: 100%;
        border: 2px solid black;
    }

    #status {
        margin-top: 10px;
        color: green;
        font-weight: bold;
    }

    input, textarea {
        width: 90%;
        padding: 8px;
        margin: 10px 0;
    }
</style>
</head>
<body>

<div class="container">

    <h2>Event Promo Video</h2>

    <!-- Video with oncanplay -->
    <video controls oncanplay="videoReady()">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <p id="status"></p>

    <h3>Event Registration</h3>

    <input type="text" id="name" placeholder="Enter your name">

    <textarea id="message" rows="4"
        placeholder="Enter your feedback"></textarea>

</div>

<script>
    // oncanplay event
    function videoReady() {
        document.getElementById("status").innerHTML =
            "Video ready to play";
    }

    // onbeforeunload event
    window.onbeforeunload = function () {
        let name = document.getElementById("name").value;
        let message = document.getElementById("message").value;

        if (name !== "" || message !== "") {
            return "You have unsaved changes. Are you sure you want to leave?";
        }
    };
</script>

</body>
</html>
