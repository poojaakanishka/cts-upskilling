<!--
4. Image Gallery for Community Events
Scenario: Show images from past events in a table layout.
Objective: Work with <img>, tables, and formatting tags.
Task:
• Use a <table> with 2 rows and 3 columns of <img> tags
• Include alt, title, and style each image with borders using a class
• Add a caption to describe each event
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Event Gallery</title>

    <style>
        .event-image {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Community Events Gallery</h1>

    <table border="1">
        <tr>
            <td>
                <img src="https://via.placeholder.com/200x150?text=Event+1"
                     alt="Tree Plantation"
                     title="Tree Plantation Drive"
                     class="event-image">
                <p><b>Tree Plantation Drive</b></p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150?text=Event+2"
                     alt="Sports Day"
                     title="Annual Sports Day"
                     class="event-image">
                <p><b>Annual Sports Day</b></p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150?text=Event+3"
                     alt="Cultural Fest"
                     title="Cultural Fest"
                     class="event-image">
                <p><b>Cultural Fest</b></p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://via.placeholder.com/200x150?text=Event+4"
                     alt="Blood Donation"
                     title="Blood Donation Camp"
                     class="event-image">
                <p><b>Blood Donation Camp</b></p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150?text=Event+5"
                     alt="Workshop"
                     title="Technical Workshop"
                     class="event-image">
                <p><b>Technical Workshop</b></p>
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150?text=Event+6"
                     alt="Community Meeting"
                     title="Community Meeting"
                     class="event-image">
                <p><b>Community Meeting</b></p>
            </td>
        </tr>
    </table>

</body>
</html>
